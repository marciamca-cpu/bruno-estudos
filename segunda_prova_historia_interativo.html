<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>História 2ª Prova — Bruno</title>
<style>
  :root { --azul:#1565c0; --azul-claro:#90caf9; --verde:#2e7d32; --vermelho:#c62828; --laranja:#e65100; --amarelo:#f9a825; --roxo:#6a1b9a; --marrom:#4e342e; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:#0d1117; color:#e6edf3; min-height:100vh; overflow-x:hidden; }

  /* TELA INICIAL */
  #tela-inicio { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#0d1117 0%,#1a1f3c 50%,#0d1117 100%); padding:30px 20px; text-align:center; }
  .logo { font-size:4em; margin-bottom:16px; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  #tela-inicio h1 { font-size:1.8em; background:linear-gradient(135deg,#90caf9,#ce93d8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
  #tela-inicio p { color:#8b949e; margin-bottom:24px; font-size:0.95em; }
  .btn-start { background:linear-gradient(135deg,var(--azul),var(--roxo)); color:white; border:none; padding:16px 40px; border-radius:50px; font-size:1.1em; font-weight:bold; cursor:pointer; width:100%; max-width:300px; box-shadow:0 4px 20px rgba(21,101,192,0.4); margin-bottom:16px; }
  .inicio-ou { color:#484f58; font-size:0.8em; margin:6px 0; }
  .topicos-lista { width:100%; max-width:400px; display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .topico-item { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:13px 16px; display:flex; align-items:center; gap:12px; text-align:left; cursor:pointer; transition:all 0.2s; width:100%; font-family:inherit; color:#e6edf3; }
  .topico-item:hover,.topico-item:active { background:rgba(21,101,192,0.25); border-color:var(--azul-claro); }
  .topico-item .num { background:var(--azul); color:white; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-size:0.8em; font-weight:bold; flex-shrink:0; }
  .topico-item span { font-size:0.88em; }

  /* LAYOUT PRINCIPAL */
  #app { display:none; min-height:100vh; flex-direction:column; }
  .topo { background:rgba(255,255,255,0.04); backdrop-filter:blur(10px); padding:12px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; border-bottom:1px solid rgba(255,255,255,0.06); }
  .btn-voltar { background:rgba(255,255,255,0.08); border:none; color:white; width:36px; height:36px; border-radius:50%; font-size:1.1em; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topo-info { flex:1; }
  .topo-sub { font-size:0.78em; color:#8b949e; }
  .topico-nome { font-size:1em; font-weight:bold; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .topo-prog { font-size:0.8em; color:#8b949e; }
  .progresso-bar { height:3px; background:rgba(255,255,255,0.08); overflow:hidden; }
  .progresso-fill { height:100%; background:linear-gradient(90deg,var(--azul),var(--roxo)); transition:width 0.5s ease; }
  .conteudo { flex:1; padding:16px; max-width:600px; margin:0 auto; width:100%; }

  /* CARDS */
  .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:20px; margin-bottom:14px; }
  .card h2 { font-size:1.15em; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .card p { font-size:0.91em; line-height:1.75; color:#cdd9e5; margin-bottom:8px; }
  .card ul { padding-left:20px; }
  .card ul li { font-size:0.88em; line-height:1.75; color:#cdd9e5; margin-bottom:3px; }
  .destaque { border-radius:10px; padding:12px 14px; margin:10px 0; font-size:0.87em; line-height:1.65; }
  .destaque strong { display:block; margin-bottom:4px; }
  .destaque.azul { background:rgba(21,101,192,0.2); border-left:4px solid var(--azul-claro); }
  .destaque.verde { background:rgba(46,125,50,0.2); border-left:4px solid #81c784; }
  .destaque.vermelho { background:rgba(198,40,40,0.2); border-left:4px solid #ef9a9a; }
  .destaque.laranja { background:rgba(230,81,0,0.2); border-left:4px solid #ffcc80; }
  .destaque.amarelo { background:rgba(249,168,37,0.2); border-left:4px solid #ffe082; }
  .destaque.roxo { background:rgba(106,27,154,0.2); border-left:4px solid #ce93d8; }
  .seq { display:flex; flex-wrap:wrap; gap:5px; align-items:center; margin:10px 0; }
  .seq-item { background:var(--azul); color:white; padding:4px 10px; border-radius:14px; font-size:0.77em; font-weight:bold; }
  .seq-seta { color:#484f58; }
  .mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:10px 0; }
  .mini-card { background:rgba(255,255,255,0.05); border-radius:10px; padding:12px; font-size:0.82em; line-height:1.55; }
  .mini-card strong { display:block; margin-bottom:4px; color:var(--azul-claro); }
  .tabela-scroll { overflow-x:auto; margin:10px 0; }
  table { width:100%; border-collapse:collapse; font-size:0.8em; min-width:320px; }
  th { background:rgba(21,101,192,0.5); color:white; padding:8px 10px; text-align:left; }
  td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,0.05); color:#cdd9e5; }
  tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
  .btn-quiz { background:linear-gradient(135deg,var(--azul),var(--roxo)); border:none; color:white; padding:14px 24px; border-radius:50px; font-size:1em; font-weight:bold; cursor:pointer; width:100%; margin:10px 0; box-shadow:0 4px 16px rgba(21,101,192,0.3); }

  /* QUIZ */
  #tela-quiz { display:none; min-height:100vh; flex-direction:column; background:#0d1117; }
  .quiz-topo { background:rgba(255,255,255,0.04); padding:14px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .quiz-progress { background:rgba(255,255,255,0.08); border-radius:20px; padding:4px 14px; font-size:0.8em; color:#8b949e; }
  .quiz-body { flex:1; padding:20px 16px; max-width:600px; margin:0 auto; width:100%; display:flex; flex-direction:column; }
  .quiz-num { font-size:0.78em; color:var(--azul-claro); font-weight:bold; margin-bottom:8px; }
  .quiz-pergunta { font-size:1.05em; font-weight:bold; line-height:1.5; margin-bottom:20px; }
  .opcoes { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .opcao { background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.09); border-radius:12px; padding:14px 16px; font-size:0.92em; cursor:pointer; transition:all 0.2s; text-align:left; color:#e6edf3; display:flex; align-items:flex-start; gap:10px; }
  .opcao .letra { background:rgba(255,255,255,0.09); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.85em; flex-shrink:0; }
  .opcao.certa { background:rgba(46,125,50,0.3); border-color:#81c784; animation:pulse-green 0.4s ease; }
  .opcao.errada { background:rgba(198,40,40,0.2); border-color:#ef9a9a; animation:shake 0.4s ease; }
  .opcao.desativada { pointer-events:none; opacity:0.45; }
  .opcao.certa .letra { background:#2e7d32; color:white; }
  .opcao.errada .letra { background:#c62828; color:white; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  @keyframes pulse-green { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  .feedback { border-radius:14px; padding:16px; margin:8px 0 14px; display:none; animation:fadeIn 0.3s ease; font-size:0.9em; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .feedback.certo { background:rgba(46,125,50,0.25); border:2px solid #81c784; display:block; }
  .feedback.errado { background:rgba(198,40,40,0.2); border:2px solid #ef9a9a; display:block; }
  .feedback-emoji { font-size:2em; margin-bottom:6px; display:block; }
  .feedback h4 { font-size:1em; margin-bottom:6px; }
  .feedback p { font-size:0.88em; line-height:1.5; color:#cdd9e5; }
  .btn-tentar { background:rgba(255,255,255,0.09); border:1px solid rgba(255,255,255,0.18); color:white; padding:10px 20px; border-radius:20px; font-size:0.88em; cursor:pointer; margin-top:10px; }
  .btn-prox { background:linear-gradient(135deg,var(--verde),#43a047); border:none; color:white; padding:12px 28px; border-radius:50px; font-size:0.95em; font-weight:bold; cursor:pointer; margin-top:10px; display:none; }

  /* RESULTADO TÓPICO */
  #tela-resultado-topico { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:30px 20px; text-align:center; background:#0d1117; }
  .resultado-emoji { font-size:4.5em; margin-bottom:16px; animation:float 2s ease-in-out infinite; }
  .resultado-titulo { font-size:1.6em; font-weight:bold; margin-bottom:8px; }
  .resultado-score { font-size:1.1em; color:#8b949e; margin-bottom:20px; }
  .score-bar { width:200px; height:12px; background:rgba(255,255,255,0.08); border-radius:6px; margin:0 auto 24px; overflow:hidden; }
  .score-fill { height:100%; border-radius:6px; transition:width 1s ease; }
  .estrelas { font-size:2em; margin:10px 0; }
  .btn-continuar { background:linear-gradient(135deg,var(--azul),var(--roxo)); border:none; color:white; padding:16px 36px; border-radius:50px; font-size:1.05em; font-weight:bold; cursor:pointer; box-shadow:0 4px 20px rgba(21,101,192,0.4); }

  /* TELA FINAL */
  #tela-final { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:30px 20px; text-align:center; background:linear-gradient(135deg,#0d1117,#1a1f3c); }
  #tela-final h1 { font-size:1.8em; background:linear-gradient(135deg,#ffd700,#ff9f00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
  .final-score { font-size:3em; font-weight:bold; color:#ffd700; margin:10px 0; }
  .final-msg { color:#8b949e; font-size:0.95em; margin-bottom:28px; line-height:1.6; }
  .btn-reiniciar { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:white; padding:14px 30px; border-radius:50px; font-size:0.95em; cursor:pointer; }
  @media(max-width:400px) { .mini-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- TELA INICIAL -->
<div id="tela-inicio">
  <div class="logo">🏛️</div>
  <h1>História · 2ª Prova</h1>
  <p>Napoleão · Congresso de Viena · Rebeliões na América Ibérica</p>

  <button class="btn-start" onclick="iniciar()">🚀 COMEÇAR DO INÍCIO</button>

  <p class="inicio-ou">— ou escolha um assunto —</p>

  <div class="topicos-lista">
    <button class="topico-item" onclick="irParaTopico(0)"><div class="num">1</div><span>👑 Ascensão de Napoleão e o Império</span></button>
    <button class="topico-item" onclick="irParaTopico(1)"><div class="num">2</div><span>📜 Código Civil e Política Militar</span></button>
    <button class="topico-item" onclick="irParaTopico(2)"><div class="num">3</div><span>❄️ Bloqueio Continental e Queda</span></button>
    <button class="topico-item" onclick="irParaTopico(3)"><div class="num">4</div><span>🗺️ Congresso de Viena e Santa Aliança</span></button>
    <button class="topico-item" onclick="irParaTopico(4)"><div class="num">5</div><span>🇧🇷 Revoltas no Brasil Colonial</span></button>
    <button class="topico-item" onclick="irParaTopico(5)"><div class="num">6</div><span>⚡ Conjurações Mineira e Baiana</span></button>
    <button class="topico-item" onclick="irParaTopico(6)"><div class="num">7</div><span>🌎 Rebeliões na América Hispânica</span></button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="topo">
    <button class="btn-voltar" onclick="voltarInicio()">←</button>
    <div class="topo-info">
      <div class="topo-sub" id="topo-sub">Tópico</div>
      <div class="topico-nome" id="topo-titulo">Carregando...</div>
    </div>
    <div class="topo-prog" id="topo-prog">1/7</div>
  </div>
  <div class="progresso-bar">
    <div class="progresso-fill" id="barra-prog" style="width:0%"></div>
  </div>
  <div class="conteudo" id="conteudo-topico"></div>
</div>

<!-- QUIZ -->
<div id="tela-quiz" style="display:none;flex-direction:column;min-height:100vh;">
  <div class="quiz-topo">
    <button class="btn-voltar" onclick="voltarConteudo()">←</button>
    <div style="flex:1;">
      <div style="font-size:0.8em;color:#8b949e;" id="quiz-topico-nome">Quiz</div>
      <div style="font-size:0.88em;font-weight:bold;" id="quiz-titulo-topo">Questão</div>
    </div>
    <div class="quiz-progress" id="quiz-progresso">1/4</div>
  </div>
  <div class="progresso-bar">
    <div class="progresso-fill" id="quiz-barra" style="width:0%"></div>
  </div>
  <div class="quiz-body">
    <div class="quiz-num" id="quiz-num">Questão 1</div>
    <div class="quiz-pergunta" id="quiz-pergunta"></div>
    <div class="opcoes" id="quiz-opcoes"></div>
    <div class="feedback" id="quiz-feedback">
      <span class="feedback-emoji" id="fb-emoji"></span>
      <h4 id="fb-titulo"></h4>
      <p id="fb-texto"></p>
      <button class="btn-tentar" id="btn-tentar" onclick="tentarNovamente()">🔄 Tentar de novo</button>
      <button class="btn-prox" id="btn-prox" onclick="proximaQuestao()">Próxima →</button>
    </div>
  </div>
</div>

<!-- RESULTADO TÓPICO -->
<div id="tela-resultado-topico" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;text-align:center;background:#0d1117;">
  <div class="resultado-emoji" id="res-emoji">🎉</div>
  <div class="resultado-titulo" id="res-titulo">Muito bem!</div>
  <div class="resultado-score" id="res-score">4 de 4 acertos</div>
  <div class="estrelas" id="res-estrelas">⭐⭐⭐</div>
  <div class="score-bar"><div class="score-fill" id="res-barra" style="width:0%"></div></div>
  <p style="color:#8b949e;font-size:0.9em;margin-bottom:24px;" id="res-msg">Arrasoooou!</p>
  <button class="btn-continuar" id="btn-continuar" onclick="proximoTopico()">Próximo assunto →</button>
</div>

<!-- TELA FINAL -->
<div id="tela-final" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px 20px;text-align:center;background:linear-gradient(135deg,#0d1117,#1a1f3c);">
  <div style="font-size:3em;animation:float 2s ease-in-out infinite;">🏆</div>
  <h1>MISSÃO CUMPRIDA!</h1>
  <p style="color:#8b949e;margin-bottom:8px;">Pontuação final:</p>
  <div class="final-score" id="final-score">0/28</div>
  <div class="estrelas" id="final-estrelas">⭐⭐⭐</div>
  <p class="final-msg" id="final-msg">Você está pronto para a prova!</p>
  <button class="btn-continuar" onclick="voltarInicio()" style="margin-bottom:12px;">🏠 Início</button>
  <button class="btn-reiniciar" onclick="reiniciar()">🔄 Recomeçar do zero</button>
</div>

<script>
// ===========================
// DADOS — TÓPICOS E QUIZZES
// ===========================
const topicos = [

// ======= TÓPICO 1 =======
{
  id:1, emoji:'👑', cor:'#1565c0', titulo:'Ascensão de Napoleão e o Império',
  conteudo:`
<div class="card">
  <h2>👑 Napoleão Bonaparte — Quem foi?</h2>
  <p>Napoleão era um general militar brilhante que aproveitou a instabilidade política da França após a Revolução Francesa para assumir o poder. Em <strong>1799</strong>, ele deu o <strong>Golpe do 18 Brumário</strong>, encerrando o Diretório e tornando-se Cônsul.</p>
  <div class="destaque azul"><strong>📅 18 Brumário = Novembro de 1799</strong>"Brumário" era o mês da névoa no calendário republicano francês. Napoleão "nublou" o poder dos outros e tomou o governo!</div>
  <p>Em <strong>1804</strong>, Napoleão se coroou <strong>Imperador da França</strong> na Catedral de Notre-Dame, em Paris.</p>
</div>
<div class="card">
  <h2>📅 Linha do Tempo Napoleão</h2>
  <div class="seq">
    <span class="seq-item">1799 Golpe</span><span class="seq-seta">→</span>
    <span class="seq-item">1804 Imperador</span><span class="seq-seta">→</span>
    <span class="seq-item">1806 Bloqueio</span><span class="seq-seta">→</span>
    <span class="seq-item">1812 Rússia</span><span class="seq-seta">→</span>
    <span class="seq-item">1815 Waterloo</span><span class="seq-seta">→</span>
    <span class="seq-item">1821 Morte</span>
  </div>
  <div class="destaque amarelo"><strong>🧠 MACETE — Golpe do 18 Brumário</strong>Napoleão assumiu em 1799 como Cônsul e se corou Imperador em 1804. São 5 anos de diferença!</div>
</div>
<div class="card">
  <h2>🎯 O que Napoleão representava?</h2>
  <ul>
    <li>A ascensão da <strong>burguesia</strong> ao poder</li>
    <li>Consolidação dos ideais da Revolução Francesa</li>
    <li>Expansão do poder francês pela Europa</li>
    <li>Era autoritário, mas defendia valores liberais burgueses</li>
  </ul>
</div>
<button class="btn-quiz" onclick="iniciarQuiz(0)">⚔️ Partir para o Quiz!</button>
`,
  questoes:[
    {p:"O Golpe do 18 Brumário (1799) encerrou qual período da história francesa?",ops:["A monarquia absoluta de Luís XVI","O Diretório","O Consulado","O Antigo Regime"],c:1,exp:"O Diretório era o governo instável após a fase mais violenta da Revolução Francesa. O golpe de Napoleão o encerrou e instaurou o Consulado."},
    {p:"Em que ano Napoleão Bonaparte foi coroado Imperador da França?",ops:["1799","1801","1804","1810"],c:2,exp:"Em 1804, 5 anos após o Golpe do 18 Brumário, Napoleão se corou Imperador na Catedral de Notre-Dame em Paris."},
    {p:"Napoleão representava os interesses de qual classe social?",ops:["Da nobreza feudal","Do clero","Da burguesia","Dos camponeses"},c:2,exp:"Napoleão consolidou os ideais burgueses da Revolução Francesa — propriedade privada, igualdade perante a lei, liberdade de trabalho. Sua ascensão foi a vitória da burguesia sobre a nobreza feudal."},
    {p:"Qual foi o nome do período de governo de Napoleão antes de se tornar Imperador?",ops:["Diretório","República","Consulado","Monarquia Constitucional"],c:2,exp:"Após o Golpe do 18 Brumário (1799), Napoleão governou como Cônsul (durante o período chamado Consulado) até se corar Imperador em 1804."}
  ]
},

// ======= TÓPICO 2 =======
{
  id:2, emoji:'📜', cor:'#1b5e20', titulo:'Código Civil e Política Militar',
  conteudo:`
<div class="card">
  <h2>📜 O Código Civil Napoleônico (1804)</h2>
  <p>Uma das maiores realizações de Napoleão foi o <strong>Código Civil de 1804</strong> — também chamado <strong>Código Napoleônico</strong>. Com cerca de 2.000 artigos, ele garantia:</p>
  <ul>
    <li>✅ <strong>Propriedade privada</strong></li>
    <li>✅ <strong>Igualdade perante a lei</strong></li>
    <li>✅ <strong>Liberdade de trabalho</strong></li>
    <li>✅ Fim dos privilégios feudais</li>
    <li>✅ Banco da França e o franco como moeda</li>
    <li>✅ Ensino público (escola aberta a todos)</li>
  </ul>
  <div class="destaque verde"><strong>🧠 MACETE — P.I.L.T.</strong><strong>P</strong>ropriedade privada · <strong>I</strong>gualdade perante a lei · <strong>L</strong>iberdade de trabalho · <strong>T</strong>rabalho livre. O Código protegia a <strong>burguesia</strong>!</div>
</div>
<div class="card">
  <h2>⚓ A Política Militar — Batalha de Trafalgar</h2>
  <p>Napoleão venceu a maioria das batalhas em terra, mas foi <strong>derrotado na Batalha de Trafalgar (1805)</strong> pela Grã-Bretanha no mar.</p>
  <div class="mini-grid">
    <div class="mini-card"><strong>Em terra</strong>Napoleão era imbatível — dominava a Europa continental</div>

  <div class="destaque verde"><strong>🧠 MACETE — Pirâmide CHA-CRI-MES-IND</strong><strong>Cha</strong>petones → <strong>Cri</strong>ollos → <strong>Mes</strong>tiços → <strong>Ind</strong>ígenas/Africanos<br><br>Os criollos lideraram as independências porque eram ricos mas excluídos dos cargos altos!</div>
</div>
<button class="btn-quiz" onclick="iniciarQuiz(6)">⚔️ Finalizar com o Quiz!</button>
`,
  questoes:[
    {p:"José Gabriel Condorcanqui adotou o nome 'Tupac Amaru II' em homenagem a:",ops:["Um deus da mitologia asteca","O último imperador inca, executado pelos espanhóis","Um líder revolucionário francês","Seu bisavô, um general colonial"],c:1,exp:"Tupac Amaru foi o último governante inca, executado pelos espanhóis. Ao adotar esse nome, José Gabriel afirmava a continuidade da resistência indígena e criava um poderoso símbolo de identidade nacional."},
    {p:"A Rebelião de Tupac Amaru II (1780) é considerada a maior revolta colonial americana porque:",ops:["Foi a única que obteve a independência do Peru","Reuniu cerca de 80 mil participantes e atingiu grandes territórios","Foi liderada por um rei legítimo","Contou com apoio de tropas europeias"],c:1,exp:"Com aproximadamente 80 mil participantes entre indígenas e criollos pobres, e atingindo vastos territórios no Peru, foi a maior mobilização colonial das Américas — embora tenha sido derrotada pela elite criolla aliada às tropas espanholas."},
    {p:"Na pirâmide social da América espanhola colonial, os 'criollos' eram:",ops:["Espanhóis nascidos na Espanha que ocupavam os cargos mais altos","Filhos de espanhóis nascidos na América, grandes proprietários mas sem acesso aos cargos mais altos","Mestiços filhos de espanhóis com indígenas","Escravizados africanos libertos"],c:1,exp:"Os criollos eram ricos (grandes proprietários, comerciantes, câmaras municipais) mas não podiam ocupar os cargos mais altos do governo colonial — reservados aos chapetones. Essa exclusão política os motivou a liderar as independências."},
    {p:"Por que os criollos lideraram as independências hispano-americanas mesmo sendo ricos?",ops:["Porque queriam libertar os escravizados e dar terra aos indígenas","Porque eram excluídos dos cargos mais altos do governo, reservados aos chapetones","Porque eram os mais pobres da sociedade colonial","Porque a metrópole os cobrava impostos maiores que os chapetones"],c:1,exp:"Os criollos tinham riqueza mas não tinham poder político. Os cargos de governadores e vice-reis eram reservados aos chapetones (espanhóis da Espanha). Influenciados pelo iluminismo, buscaram independência para assumir o controle político — mas mantendo a estrutura social sem liberar escravos ou dar terras a indígenas."}
  ]
}
];

// ===========================
// ESTADO
// ===========================
let topicoAtual = 0;
let questaoAtual = 0;
let acertosTopico = 0;
let acertosTotal = 0;
let tentativasQuestao = 0;

const msgErro = [
  "😅 Quase! Lê de novo com calma e tenta outra vez!",
  "🤔 Não foi dessa vez... Mas você consegue! Vamos lá!",
  "😬 Errou! Respira fundo e tenta de novo, vai!",
  "🙈 Ih, escorregou! Relê a pergunta e vai com tudo!",
  "💪 Erro faz parte! Pensa bem e tenta de novo!",
  "🎯 Quase na mosca! Mais uma tentativa!"
];
const msgAcerto = [
  "🔥 ISSO AÍ! Você sabia!",
  "🎉 ARRASOU! Continua assim!",
  "⚡ EXATO! Esse Bruno tá preparado!",
  "🏆 PERFEITO! Nota 10!",
  "💥 MANDOU MUITO BEM!"
];

// ===========================
// FUNÇÕES
// ===========================
function iniciar() {
  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  mostrarTopico(0);
}

function irParaTopico(index) {
  document.getElementById('tela-inicio').style.display = 'none';
  document.getElementById('tela-quiz').style.display = 'none';
  document.getElementById('tela-resultado-topico').style.display = 'none';
  document.getElementById('tela-final').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  mostrarTopico(index);
}

function voltarInicio() {
  document.getElementById('tela-inicio').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-quiz').style.display = 'none';
  document.getElementById('tela-resultado-topico').style.display = 'none';
  document.getElementById('tela-final').style.display = 'none';
}

function mostrarTopico(index) {
  topicoAtual = index;
  const t = topicos[index];
  document.getElementById('topo-sub').textContent = `Tópico ${index + 1} de ${topicos.length}`;
  document.getElementById('topo-titulo').textContent = `${t.emoji} ${t.titulo}`;
  document.getElementById('topo-prog').textContent = `${index + 1}/${topicos.length}`;
  document.getElementById('barra-prog').style.width = `${((index + 1) / topicos.length) * 100}%`;
  document.getElementById('conteudo-topico').innerHTML = t.conteudo;
  document.getElementById('app').scrollTo(0, 0);
  window.scrollTo(0, 0);
}

function voltarConteudo() {
  document.getElementById('tela-quiz').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  mostrarTopico(topicoAtual);
}

function iniciarQuiz(topicoIndex) {
  topicoAtual = topicoIndex;
  questaoAtual = 0;
  acertosTopico = 0;
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-quiz').style.display = 'flex';
  document.getElementById('quiz-topico-nome').textContent = topicos[topicoIndex].emoji + ' ' + topicos[topicoIndex].titulo;
  mostrarQuestao();
}

function mostrarQuestao() {
  const t = topicos[topicoAtual];
  const q = t.questoes[questaoAtual];
  tentativasQuestao = 0;
  document.getElementById('quiz-num').textContent = `Questão ${questaoAtual + 1}`;
  document.getElementById('quiz-titulo-topo').textContent = `Questão ${questaoAtual + 1} de ${t.questoes.length}`;
  document.getElementById('quiz-progresso').textContent = `${questaoAtual + 1}/${t.questoes.length}`;
  document.getElementById('quiz-barra').style.width = `${((questaoAtual) / t.questoes.length) * 100}%`;
  document.getElementById('quiz-pergunta').textContent = q.p;
  const letras = ['A','B','C','D'];
  document.getElementById('quiz-opcoes').innerHTML = q.ops.map((op, i) =>
    `<button class="opcao" onclick="verificarResposta(${i}, this)">
      <span class="letra">${letras[i]}</span>${op}
    </button>`
  ).join('');
  const fb = document.getElementById('quiz-feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  document.getElementById('btn-prox').style.display = 'none';
}

function verificarResposta(index, btn) {
  const t = topicos[topicoAtual];
  const q = t.questoes[questaoAtual];
  tentativasQuestao++;
  const opcoes = document.querySelectorAll('.opcao');
  opcoes.forEach(o => o.classList.add('desativada'));
  const fb = document.getElementById('quiz-feedback');

  if (index === q.c) {
    btn.classList.remove('desativada');
    btn.classList.add('certa');
    acertosTopico++;
    acertosTotal++;
    const msg = msgAcerto[Math.floor(Math.random() * msgAcerto.length)];
    fb.className = 'feedback certo';
    document.getElementById('fb-emoji').textContent = '✅';
    document.getElementById('fb-titulo').textContent = msg;
    document.getElementById('fb-texto').textContent = q.exp;
    document.getElementById('btn-tentar').style.display = 'none';
    document.getElementById('btn-prox').style.display = 'inline-block';
    document.getElementById('quiz-barra').style.width = `${((questaoAtual + 1) / t.questoes.length) * 100}%`;
  } else {
    btn.classList.remove('desativada');
    btn.classList.add('errada');
    const msg = msgErro[Math.floor(Math.random() * msgErro.length)];
    fb.className = 'feedback errado';
    document.getElementById('fb-emoji').textContent = '❌';
    document.getElementById('fb-titulo').textContent = msg;
    document.getElementById('fb-texto').textContent = 'Relê o conteúdo e tenta de novo!';
    document.getElementById('btn-tentar').style.display = 'inline-block';
    document.getElementById('btn-prox').style.display = 'none';
  }
}

function tentarNovamente() {
  mostrarQuestao();
}

function proximaQuestao() {
  const t = topicos[topicoAtual];
  if (questaoAtual + 1 < t.questoes.length) {
    questaoAtual++;
    mostrarQuestao();
  } else {
    mostrarResultadoTopico();
  }
}

function mostrarResultadoTopico() {
  document.getElementById('tela-quiz').style.display = 'none';
  const total = topicos[topicoAtual].questoes.length;
  const perc = (acertosTopico / total) * 100;
  let emoji, titulo, msg, cor;
  if (perc === 100) { emoji='🏆'; titulo='PERFEITO!'; msg='Você dominou esse assunto! Incrível!'; cor='#2e7d32'; }
  else if (perc >= 75) { emoji='🎉'; titulo='Muito bem!'; msg='Quase perfeito! Dá uma revisada no que errou.'; cor='#1565c0'; }
  else if (perc >= 50) { emoji='😊'; titulo='Bom!'; msg='Está no caminho certo. Releia o conteúdo antes da prova.'; cor='#e65100'; }
  else { emoji='💪'; titulo='Continue tentando!'; msg='Releia o conteúdo e tente o quiz de novo!'; cor='#c62828'; }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-titulo').textContent = titulo;
  document.getElementById('res-score').textContent = `${acertosTopico} de ${total} acertos`;
  document.getElementById('res-estrelas').textContent = perc===100?'⭐⭐⭐':perc>=75?'⭐⭐':'⭐';
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-barra').style.background = cor;
  setTimeout(() => { document.getElementById('res-barra').style.width = perc + '%'; }, 200);
  const btnCont = document.getElementById('btn-continuar');
  if (topicoAtual + 1 < topicos.length) {
    btnCont.textContent = 'Próximo assunto →';
    btnCont.onclick = proximoTopico;
  } else {
    btnCont.textContent = '🏁 Ver resultado final';
    btnCont.onclick = mostrarFinal;
  }
  const el = document.getElementById('tela-resultado-topico');
  el.style.display = 'flex';
}

function proximoTopico() {
  document.getElementById('tela-resultado-topico').style.display = 'none';
  if (topicoAtual + 1 < topicos.length) {
    document.getElementById('app').style.display = 'flex';
    mostrarTopico(topicoAtual + 1);
  } else {
    mostrarFinal();
  }
}

function mostrarFinal() {
  document.getElementById('tela-resultado-topico').style.display = 'none';
  document.getElementById('tela-quiz').style.display = 'none';
  const totalQuestoes = topicos.reduce((s, t) => s + t.questoes.length, 0);
  const perc = (acertosTotal / totalQuestoes) * 100;
  document.getElementById('final-score').textContent = `${acertosTotal}/${totalQuestoes}`;
  let estrelas, msg;
  if (perc >= 90) { estrelas='⭐⭐⭐'; msg='IMPRESSIONANTE! Você está mais do que pronto para a prova! 🔥'; }
  else if (perc >= 70) { estrelas='⭐⭐'; msg='Ótimo resultado! Revise os erros e você manda bem na prova!'; }
  else { estrelas='⭐'; msg='Releia o resumo, refaça os tópicos com mais dificuldade e você vai arrasar!'; }
  document.getElementById('final-estrelas').textContent = estrelas;
  document.getElementById('final-msg').textContent = msg;
  document.getElementById('tela-final').style.display = 'flex';
}

function reiniciar() {
  acertosTotal = 0;
  acertosTopico = 0;
  questaoAtual = 0;
  topicoAtual = 0;
  voltarInicio();
}
</script>
</body>
</html>
